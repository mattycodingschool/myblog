<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>visualizer</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="./favicon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Times New Roman', Times, serif; }
  #bc { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 12px;
    background: linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0));
    color: #f2f2ee;
    opacity: 0; transition: opacity 0.35s;
  }
  body.ui #hud, #hud:hover { opacity: 1; }
  button, #home {
    font: 15px 'Times New Roman', serif; color: #fff; cursor: pointer;
    padding: 6px 16px; border-radius: 10px;
    background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.3);
  }
  #home { text-decoration: none; }
  button:hover, #home:hover { background: rgba(255,255,255,0.28); }
  #name { font-size: 15px; letter-spacing: 0.02em; text-shadow: 0 1px 4px #000; flex: 1; min-width: 160px; }
  #jump { max-width: 38vw; font: 13px 'Times New Roman', serif; background: #111; color: #eee; border: 1px solid #444; border-radius: 8px; padding: 5px; }
  #dock {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 5;
    display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
    padding: 14px 12px;
    background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.78));
    color: #f2f2ee;
    opacity: 0; transition: opacity 0.35s;
  }
  body.ui #dock, #dock:hover { opacity: 1; }
  #linkrow { display: flex; gap: 8px; flex: 1; min-width: 260px; }
  #trackrow { display: none; flex-direction: column; gap: 6px; min-width: 300px; flex: 1; }
  #trackrow.on { display: flex; }
  #tracktitle { font-size: 14px; text-shadow: 0 1px 4px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60vw; }
  #track { width: 100%; height: 36px; filter: invert(1) hue-rotate(180deg) saturate(0); opacity: 0.85; }
  #meter { width: 100%; display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.7); }
  #meter i { flex: 1; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.12); overflow: hidden; position: relative; }
  #meter i::after { content: ''; position: absolute; inset: 0 auto 0 0; width: var(--lvl, 0%); background: linear-gradient(90deg, #4fd, #9fdc9f, #fd7); transition: width 0.05s linear; }
  #meter span { min-width: 230px; font-variant-numeric: tabular-nums; }
  #hint { font-size: 12.5px; color: rgba(255,255,255,0.55); width: 100%; }
  label { font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
  #sens { width: 96px; accent-color: #9fdc9f; cursor: pointer; }
</style>
<script src="js/butterchurn.min.js"></script>
<script src="js/presets-full.js"></script>
<script src="js/custom-presets.js"></script>
</head>
<body class="ui">
<canvas id="bc"></canvas>

<div id="hud">
  <a id="home" href="./" title="back to the main page">home</a>
  <button id="prev">&#8592;</button>
  <button id="next">&#8594;</button>
  <button id="rand">random</button>
  <label><input type="checkbox" id="auto" checked> drift</label>
  <label title="how hard the visuals react to the music">sens
    <input type="range" id="sens" min="0" max="100" value="45">
  </label>
  <span id="name"></span>
  <select id="jump"></select>
</div>

<div id="dock">
  <div id="linkrow">
    <button id="upload">upload a song</button>
    <input id="file" type="file" accept="audio/*" hidden />
    <button id="capture">or sync audio from another tab</button>
    <button id="mic">or use microphone</button>
  </div>
  <div id="trackrow">
    <span id="tracktitle"></span>
    <audio id="track" controls></audio>
  </div>
  <span id="hint"></span>
  <div id="meter" title="signal on butterchurn's analyser bus"><i></i><span></span></div>
</div>

<script>
const IS_MOBILE = matchMedia('(pointer: coarse)').matches;
const RENDER_DPR = IS_MOBILE ? 1 : Math.min(devicePixelRatio, 2);
/* supersample butterchurn's internal render then downscale to the canvas —
   sharpens the warp/detail that otherwise looks soft next to native projectM */
const SS = IS_MOBILE ? 1 : 1.5;

/* clean display names — keys into the pack stay untouched */
const DISPLAY = {
  "$$$ Royal - Mashup (326)": "Royal - Mashup",
  "A Ultimate AdamFX 2 Martin - disco mix 6 (UFO RMX)Inside the ship (WithFlexRmx)": "AdamFX & Martin - Inside the Ship",
  "EoS and Zylot - skylight (Stained Glass Majesty mix) caralhoooo a 5": "EoS & Zylot - Skylight",
  "Flexi - a stream of consciousness [ad absurdum] - having a will is about naive as 'having' nz+ w11 unmitigated union with roosta": "Flexi - A Stream of Consciousness",
  "Flexi, suksma + Martin - the object of the game is also known as eristics and rabulistics": "Flexi, Suksma & Martin - The Object of the Game",
  "Goody + Suksma - Goodbye my enemy ['not really, just want to hack you off' mix]": "Goody & Suksma - Enemy",
  "Halfbreak + Cope + GreatWho - Mandalla Flow (triangular happy)": "Halfbreak, Cope & GreatWho - Mandalla Flow",
  "Illusion & Rovastar - Dotty Mad Space (Jelly)": "Illusion & Rovastar - Dot Space",
  "Illusion - Heavenly Eye - radial blur": "Illusion - Heavenly Eye",
  "ORB - Cosmic Dream": "ORB - Cosmic Dream",
  "ORB - Pastel Primer": "ORB - Pastel Primer",
  "Phat + EoS - Tessellating Fractal, Phat - Square Faces V2, Benski - Tone-mapped Fractal Drop, Flexi - Smouldering": "Phat, EoS, Benski & Flexi - Tessellating Fractal",
  "Rozzor & Rovastar - Dynamic Swirls 3 (Mysticial Awakening Mix Tweak) - cpe flacc": "Rozzor & Rovastar - Dynamic Swirls 3",
  "Serge + 158 009": "Serge & 158 - 009",
  "Waltra - Fast Distance": "Waltra - Fast Distance",
  "cope + flexi - mother-of-whirl [mr understatement] - a circumlocution of abstract pain": "Cope & Flexi - Mother-of-Whirl",
  "martin - reflections on black tiles": "Martin - Reflections on Black Tiles",
  "martin - shiny tunnel": "Martin - Shiny Tunnel",
  "suksma - dinner - ratios that make you feel hopeless": "Suksma - Dinner",
  "suksma - dotes hostile undertake - can't even remember her blood mist eminant roam3": "Suksma - Hostile",
  "suksma - dotes hostile undertake - mash vs expand - flacc": "Suksma - Hostile (Mash)",
  "suksma - ephemefake compartmentalist waferlotch": "Suksma - Ephemefake",
  "suksma - kun weit - pleasure is best when shared": "Suksma - Kun Weit",
  "suksma - log spec with phase diff - for marrow frygian sake": "Suksma - Log Spec with Phase Diff",
  "suksma - one thought": "Suksma - One Thought",
  "suksma - vector exp 1": "Suksma - Vector Exp 1",
  "tunnel from the top": "Tunnel from the Top"
};
/* Promote the finished custom eye into the saved visualizer collection while
   keeping one source of truth for the preset itself. */
if (window.CUSTOM_PRESETS && window.CUSTOM_PRESETS["3D Eye"]) {
  window.TESTER_PRESETS["3D Eye"] = window.CUSTOM_PRESETS["3D Eye"];
}
const disp = n => DISPLAY[n] || n;
const names = Object.keys(window.TESTER_PRESETS);
const canvas = document.getElementById('bc');
let viz = null, actx = null, tap = null, idx = 0;
const broken = new Set();
let linkOK = true;
let shaper = null;
/* makeup gain for captured/mic audio, which arrives far quieter than a decoded file */
let liveGain = null;
const LIVE_BOOST = 1.5;

/* sensitivity: butterchurn auto-normalizes level (AGC), so a plain gain does
   nothing. instead we reshape the waveform. lower exponents (k<1) lift the
   whole signal so more of it drives the visuals — so higher slider = lower k
   = more movement */
function makeCurve(k) {
  const n = 2048, c = new Float32Array(n);
  for (let i = 0; i < n; i++) { const x = (i / (n - 1)) * 2 - 1; c[i] = Math.sign(x) * Math.pow(Math.abs(x), k); }
  return c;
}
function setSensitivity(v) {
  if (shaper) shaper.curve = makeCurve(0.5 + ((100 - v) / 100) * 2.5);
}

function size() {
  canvas.width = canvas.clientWidth * RENDER_DPR;
  canvas.height = canvas.clientHeight * RENDER_DPR;
}
addEventListener('resize', () => {
  if (!viz) return;
  size();
  viz.setRendererSize(canvas.width, canvas.height);
});

function tryLoad(i, blend) {
  idx = ((i % names.length) + names.length) % names.length;
  const p = window.TESTER_PRESETS[names[idx]];
  if (!p || !p.shapes) { broken.add(idx); return false; }
  linkOK = true;
  viz.loadPreset(p, blend);
  viz.render();
  if (!linkOK) { broken.add(idx); return false; }
  document.getElementById('name').textContent = disp(names[idx]);
  document.getElementById('jump').value = idx;
  return true;
}

/* skip presets whose shaders won't compile on this GPU (some milkdrop shaders
   use features butterchurn can't build); scan in the requested direction */
function show(i, blend, dir = 1) {
  for (let n = 0; n < names.length; n++) {
    const j = i + n * dir;
    const jj = ((j % names.length) + names.length) % names.length;
    if (broken.has(jj)) continue;
    if (tryLoad(jj, n === 0 ? blend : 0)) return;
  }
}

async function init() {
  actx = new (window.AudioContext || window.webkitAudioContext)();
  /* browsers start the context suspended until a user gesture; wake it on the
     first interaction so uploaded/captured/mic audio actually flows */
  const wake = () => actx.resume();
  addEventListener('pointerdown', wake, { once: true });
  addEventListener('keydown', wake, { once: true });
  const BC = window.butterchurn.default || window.butterchurn;
  size();
  viz = BC.createVisualizer(actx, canvas, { width: canvas.width, height: canvas.height, pixelRatio: 1, textureRatio: SS });
  /* catch presets whose shaders won't compile so show() can skip them */
  const gl = canvas.getContext('webgl2');
  if (gl && !gl.__linkWrapped) {
    gl.__linkWrapped = true;
    const _link = gl.linkProgram.bind(gl);
    gl.linkProgram = function (p) { _link(p); if (!gl.getProgramParameter(p, gl.LINK_STATUS)) linkOK = false; };
  }
  tap = actx.createGain();
  shaper = actx.createWaveShaper();
  shaper.connect(tap);
  liveGain = actx.createGain();
  liveGain.gain.value = LIVE_BOOST;
  liveGain.connect(shaper);
  viz.connectAudio(tap);
  setSensitivity(+document.getElementById('sens').value);
  show(Math.floor(Math.random() * names.length), 0);

  /* diagnostic meter: reads the SAME bus butterchurn analyses (tap). shows
     peak deviation so we can tell if audio actually reaches the visualizer */
  const meterAn = actx.createAnalyser();
  meterAn.fftSize = 1024;
  tap.connect(meterAn);
  const buf8 = new Uint8Array(meterAn.fftSize);
  const bar = document.querySelector('#meter i');
  const txt = document.querySelector('#meter span');
  (function meterLoop() {
    let pct = 0;
    const live = capSrc || micSrc || (mediaSrc && !trackEl.paused);
    if (live) {
      meterAn.getByteTimeDomainData(buf8);
      let peak = 0;
      for (let k = 0; k < buf8.length; k++) peak = Math.max(peak, Math.abs(buf8[k] - 128));
      pct = Math.min(100, (peak / 128) * 100);
    }
    bar.style.setProperty('--lvl', pct.toFixed(0) + '%');
    txt.textContent = `signal ${pct.toFixed(0)}%`;
    requestAnimationFrame(meterLoop);
  })();

  (function loop() { viz.render(); requestAnimationFrame(loop); })();
}

document.getElementById('prev').addEventListener('click', () => show(idx - 1, 2.7));
document.getElementById('next').addEventListener('click', () => show(idx + 1, 2.7));
document.getElementById('rand').addEventListener('click', () => show(Math.floor(Math.random() * names.length), 2.7));
addEventListener('keydown', e => {
  if (!viz || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') show(idx + 1, e.shiftKey ? 0 : 2.7);
  if (e.key === 'ArrowLeft') show(idx - 1, e.shiftKey ? 0 : 2.7);
});

const jump = document.getElementById('jump');
names.forEach((n, i) => {
  const o = document.createElement('option');
  o.value = i; o.textContent = disp(n);
  jump.appendChild(o);
});
jump.addEventListener('change', () => { if (viz) show(+jump.value, 2.7); });

document.getElementById('sens').addEventListener('input', e => setSensitivity(+e.target.value));

/* drift: wander to a new preset every so often, like leaving milkdrop alone */
setInterval(() => {
  if (viz && document.getElementById('auto').checked)
    show(Math.floor(Math.random() * names.length), 2.7);
}, 25000);

/* ---- your song: pick a local file, it plays entirely in the browser through
   the same analyser, so the visuals track the actual track ---- */
const trackEl = document.getElementById('track');
const hint = document.getElementById('hint');
let mediaSrc = null;
function wireTrack() {
  if (mediaSrc || !actx) return;
  mediaSrc = actx.createMediaElementSource(trackEl);
  mediaSrc.connect(shaper);
  mediaSrc.connect(actx.destination);
  trackEl.addEventListener('play', () => actx.resume());
}
const fileEl = document.getElementById('file');
document.getElementById('upload').addEventListener('click', () => fileEl.click());
fileEl.addEventListener('change', () => {
  const f = fileEl.files[0];
  if (!f) return;
  hint.textContent = '';
  wireTrack();
  document.getElementById('tracktitle').textContent = f.name.replace(/\.[^.]+$/, '');
  document.getElementById('trackrow').classList.add('on');
  trackEl.src = URL.createObjectURL(f);
  trackEl.play().catch(() => { hint.textContent = 'press play'; });
});

/* ---- real audio: capture this tab's sound and feed the analyser ---- */
const capBtn = document.getElementById('capture');
let capStream = null, capSrc = null;
capBtn.addEventListener('click', async () => {
  if (!viz) return;
  if (capStream) { stopCapture(); return; }
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      selfBrowserSurface: 'exclude', systemAudio: 'include',
    });
    if (!stream.getAudioTracks().length) {
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('hint').textContent = 'no audio in that capture — pick "this tab" and tick "also share tab audio"';
      return;
    }
    stream.getVideoTracks().forEach(t => t.stop());
    capStream = stream;
    capSrc = actx.createMediaStreamSource(stream);
    capSrc.connect(liveGain);
    capBtn.textContent = 'stop tab sync';
    document.getElementById('hint').textContent = '● live tab audio';
    stream.getAudioTracks()[0].addEventListener('ended', stopCapture);
  } catch (e) {
    if (e.name !== 'NotAllowedError')
      document.getElementById('hint').textContent = 'capture failed: ' + e.message;
  }
});
function stopCapture() {
  if (capSrc) { capSrc.disconnect(); capSrc = null; }
  if (capStream) { capStream.getTracks().forEach(t => t.stop()); capStream = null; }
  capBtn.textContent = 'sync via tab audio instead';
  document.getElementById('hint').textContent = '';
}

/* ---- microphone: feed live mic audio into the analyser ---- */
const micBtn = document.getElementById('mic');
let micStream = null, micSrc = null;
micBtn.addEventListener('click', async () => {
  if (!viz) return;
  if (micStream) { stopMic(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    });
    micStream = stream;
    micSrc = actx.createMediaStreamSource(stream);
    micSrc.connect(liveGain);
    micBtn.textContent = 'stop microphone';
    hint.textContent = '● live microphone';
    stream.getAudioTracks()[0].addEventListener('ended', stopMic);
    actx.resume();
  } catch (e) {
    if (e.name !== 'NotAllowedError')
      hint.textContent = 'mic failed: ' + e.message;
  }
});
function stopMic() {
  if (micSrc) { micSrc.disconnect(); micSrc = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  micBtn.textContent = 'or use microphone';
  hint.textContent = '';
}

/* fade chrome away while watching; any pointer nudge brings it back */
let uiTimer;
function wakeUi() {
  document.body.classList.add('ui');
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => document.body.classList.remove('ui'), 3500);
}
addEventListener('pointermove', wakeUi);
addEventListener('pointerdown', wakeUi);
wakeUi();

init();
</script>
</body>
</html>
